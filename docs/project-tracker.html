<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvestSim v1.0 — Project Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── DESIGN SYSTEM ──────────────────────────────────────── */
    :root {
      --bg:           #0D1117;
      --bg-card:      #161B22;
      --bg-card-alt:  #1C2128;
      --border:       #30363D;
      --border-light: #21262D;
      --text-primary: #E6EDF3;
      --text-secondary:#8B949E;
      --text-muted:   #484F58;
      --accent:       #2EA8FF;
      --accent-dim:   #1A5C8A;

      --green:        #3FB950;
      --green-bg:     #0D2E17;
      --green-border: #238636;
      --yellow:       #D29922;
      --yellow-bg:    #2D2007;
      --yellow-border:#BB8009;
      --red:          #F85149;
      --red-bg:       #2D0F0E;
      --red-border:   #B62324;
      --pending:      #30363D;
      --pending-bg:   #161B22;

      --phase-0: #58A6FF;
      --phase-1: #3FB950;
      --phase-2: #D29922;
      --phase-3: #F78166;
      --phase-4: #BC8CFF;
      --phase-5: #FF7B72;
      --phase-6: #39D353;
      --phase-7: #FFA657;

      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'DM Sans', sans-serif;
      --radius: 6px;
      --transition: 0.15s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    .header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-title {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .header-title h1 {
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .header-title span {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header-meta {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .meta-label {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .meta-value {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* ── PROGRESS BAR ───────────────────────────────────────── */
    .progress-container {
      max-width: 1100px;
      margin: 24px auto 0;
      padding: 0 32px;
    }

    .progress-stats {
      display: flex;
      gap: 16px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid;
    }

    .stat-chip.total   { color: var(--text-secondary); border-color: var(--border); background: var(--bg-card); }
    .stat-chip.done-on { color: var(--green); border-color: var(--green-border); background: var(--green-bg); }
    .stat-chip.done-late{ color: var(--yellow); border-color: var(--yellow-border); background: var(--yellow-bg); }
    .stat-chip.overdue { color: var(--red); border-color: var(--red-border); background: var(--red-bg); }
    .stat-chip.pending { color: var(--text-secondary); border-color: var(--border); background: var(--bg-card); }

    .stat-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      display: flex;
    }

    .progress-fill {
      height: 100%;
      transition: width 0.4s ease;
    }
    .progress-fill.green  { background: var(--green); }
    .progress-fill.yellow { background: var(--yellow); }
    .progress-fill.red    { background: var(--red); }

    /* ── MAIN LAYOUT ────────────────────────────────────────── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 32px 60px;
    }

    /* ── PHASE BLOCK ────────────────────────────────────────── */
    .phase-block {
      margin-bottom: 8px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .phase-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--bg-card);
      cursor: pointer;
      user-select: none;
      gap: 12px;
      border-bottom: 1px solid var(--border-light);
      transition: background var(--transition);
    }

    .phase-header:hover { background: var(--bg-card-alt); }

    .phase-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .phase-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .phase-name {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .phase-dates {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
    }

    .phase-header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .phase-progress-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
    }

    .phase-chevron {
      font-size: 10px;
      color: var(--text-muted);
      transition: transform var(--transition);
    }

    .phase-block.collapsed .phase-chevron { transform: rotate(-90deg); }
    .phase-block.collapsed .phase-body    { display: none; }

    /* ── TASK ROW ────────────────────────────────────────────── */
    .task-row {
      display: grid;
      grid-template-columns: 32px 70px 1fr 110px 90px 90px;
      align-items: center;
      gap: 12px;
      padding: 9px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border-light);
      transition: background var(--transition);
    }

    .task-row:last-child { border-bottom: none; }
    .task-row:hover      { background: var(--bg-card-alt); }

    /* Checkbox */
    .task-check {
      width: 18px; height: 18px;
      border-radius: 4px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all var(--transition);
      position: relative;
    }

    .task-check:hover {
      border-color: var(--accent);
    }

    .task-check svg {
      display: none;
      width: 10px; height: 10px;
    }

    /* Status colours applied to row */
    .task-row.status-ontime  .task-check { border-color: var(--green);  background: var(--green-bg);  }
    .task-row.status-ontime  .task-check svg { display: block; color: var(--green); }
    .task-row.status-late1   .task-check { border-color: var(--yellow); background: var(--yellow-bg); }
    .task-row.status-late1   .task-check svg { display: block; color: var(--yellow); }
    .task-row.status-overdue .task-check { border-color: var(--red);    background: var(--red-bg);    }
    .task-row.status-overdue .task-check svg { display: block; color: var(--red); }

    .task-row.status-ontime  { background: color-mix(in srgb, var(--green-bg) 30%, var(--bg)); }
    .task-row.status-late1   { background: color-mix(in srgb, var(--yellow-bg) 40%, var(--bg)); }
    .task-row.status-overdue { background: color-mix(in srgb, var(--red-bg) 40%, var(--bg)); }

    /* WBS ID */
    .task-id {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }

    /* Label + description */
    .task-content { min-width: 0; }

    .task-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-row.status-ontime  .task-label { text-decoration: line-through; color: var(--text-muted); }
    .task-row.status-late1   .task-label { text-decoration: line-through; color: var(--text-muted); }
    .task-row.status-overdue .task-label { text-decoration: line-through; color: var(--text-muted); }

    .task-desc {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Scheduled date */
    .task-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      text-align: right;
      white-space: nowrap;
    }

    .task-date .date-label {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
    }

    /* Duration */
    .task-dur {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      text-align: right;
    }

    /* Status badge */
    .task-status {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      text-align: center;
      white-space: nowrap;
      border: 1px solid;
      cursor: pointer;
      transition: all var(--transition);
    }

    .task-status.pending  { color: var(--text-muted);  border-color: var(--border);        background: transparent; }
    .task-status.ontime   { color: var(--green);        border-color: var(--green-border);  background: var(--green-bg); }
    .task-status.late1    { color: var(--yellow);       border-color: var(--yellow-border); background: var(--yellow-bg); }
    .task-status.overdue  { color: var(--red);          border-color: var(--red-border);    background: var(--red-bg); }

    /* ── DATE PICKER MODAL ──────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .modal h3 {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .modal-sub {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .modal-field {
      margin-bottom: 14px;
    }

    .modal-field label {
      display: block;
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 5px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal-field input[type="date"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      transition: border-color var(--transition);
    }

    .modal-field input[type="date"]:focus {
      border-color: var(--accent);
    }

    .modal-scheduled {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: var(--radius);
      border: 1px solid;
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-cancel {
      background: transparent;
      color: var(--text-secondary);
      border-color: var(--border);
    }
    .btn-cancel:hover { background: var(--bg-card-alt); }

    .btn-confirm {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent);
    }
    .btn-confirm:hover { background: var(--accent); color: #000; }

    .btn-clear {
      background: transparent;
      color: var(--red);
      border-color: var(--red-border);
    }
    .btn-clear:hover { background: var(--red-bg); }

    /* ── TODAY LINE ─────────────────────────────────────────── */
    .today-banner {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      padding: 6px 16px;
      background: color-mix(in srgb, var(--accent-dim) 20%, transparent);
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .today-banner::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* ── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 760px) {
      .task-row {
        grid-template-columns: 28px 55px 1fr 90px;
      }
      .task-dur, .task-status { display: none; }
      .progress-container, .main { padding: 16px; }
      .header { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ───────────────────────────────────────────────── -->
<header class="header">
  <div class="header-inner">
    <div class="header-title">
      <h1>InvestSim v1.0</h1>
      <span>Project Tracker</span>
    </div>
    <div class="header-meta">
      <div class="meta-item">
        <span class="meta-label">Start</span>
        <span class="meta-value" id="hdr-start">Mar 01, 2026</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Target End</span>
        <span class="meta-value" id="hdr-end">—</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Today</span>
        <span class="meta-value" id="hdr-today">—</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Working Days</span>
        <span class="meta-value">40.5 days</span>
      </div>
    </div>

</header>

<!-- ── PROGRESS ─────────────────────────────────────────────── -->
<div class="progress-container">
  <div class="progress-stats" id="progress-stats"></div>
  <div class="progress-track" id="progress-track"></div>
</div>

<main class="main" id="main-content"></main>

<!-- ── MODAL ────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Mark Task Complete</h3>
    <p class="modal-sub" id="modal-sub"></p>
    <div class="modal-field">
      <label>Date Completed</label>
      <input type="date" id="modal-date-input">
    </div>

    <div class="modal-actions">
      <button class="btn btn-clear" id="modal-clear-btn">Clear</button>

      <button class="btn btn-confirm" id="modal-confirm-btn">Mark Complete</button>
    </div>
  </div>
</div>

<script>
// ── WORKING DAY UTILITIES ────────────────────────────────────

const PROJECT_START = new Date('2026-03-01T00:00:00');

/**
 * Add N working days (Mon–Fri) to a given date.
 * @param {Date} startDate
 * @param {number} days - may be fractional (0.5 = half day, scheduled same day)
 * @returns {Date}
 */
function addWorkingDays(startDate, days) {
  // For fractional days, round up to nearest whole day for scheduling purposes
  const wholeDays = Math.ceil(days);
  const date = new Date(startDate);
  let added = 0;
  while (added < wholeDays) {
    date.setDate(date.getDate() + 1);
    const dow = date.getDay();
    if (dow !== 0 && dow !== 6) added++;
  }
  return date;
}

/**
 * Format a Date as "Mar 01, 2026"
 * @param {Date} d
 * @returns {string}
 */
function fmtDate(d) {
  return d.toLocaleDateString('en-CA', { month: 'short', day: '2-digit', year: 'numeric' });
}

/**
 * Format a Date as "YYYY-MM-DD" for input[type=date]
 * @param {Date} d
 * @returns {string}
 */
function fmtISO(d) {
  return d.toISOString().slice(0, 10);
}

/**
 * Compute the scheduled due date for a task given its cumulative
 * working-day end offset from the project start.
 * @param {number} efDays - Early Finish in working days from project start
 * @returns {Date}
 */
function scheduledDate(efDays) {
  // EF of 0 means same day as start; fractional days get the same working day
  if (efDays <= 0) return new Date(PROJECT_START);
  return addWorkingDays(PROJECT_START, efDays);
}

// ── TASK DATA ────────────────────────────────────────────────
// ef = Early Finish in working days (from PERT forward pass)
// dur = duration in working days

const PHASES = [
  {
    id: 0, name: 'Phase 0 · Setup', colour: '#58A6FF',
    tasks: [
      { id: 'p01', wbs: '0.1', label: 'GitHub Repository',        dur: 0.5,  ef: 0.5,  desc: 'Create repo with main and develop branches; apply .gitignore' },
      { id: 'p02', wbs: '0.2', label: 'VS Code / ESLint / Prettier', dur: 0.5, ef: 1.0, desc: 'Configure IDE, .eslintrc.js, .prettierrc, workspace settings' },
      { id: 'p03', wbs: '0.3', label: 'Firebase Project',          dur: 1.0,  ef: 2.0,  desc: 'Create Firebase project, enable Auth and Firestore on Spark tier' },
      { id: 'p04', wbs: '0.4', label: 'Firebase Emulator Suite',   dur: 1.0,  ef: 3.0,  desc: 'Configure firebase.json, .firebaserc, and local emulator for Auth + Firestore' },
      { id: 'p05', wbs: '0.5', label: '.env.example',              dur: 0.5,  ef: 3.5,  desc: 'Document all environment variables with placeholder values; never commit real values' },
      { id: 'p06', wbs: '0.6', label: 'GitHub Actions Workflow',   dur: 1.0,  ef: 4.5,  desc: 'Create deploy.yml — automated deployment to GitHub Pages from main branch' },
      { id: 'p07', wbs: '0.7', label: 'Owner Account Script',      dur: 0.5,  ef: 5.0,  desc: 'Write and run one-time script to create Owner account in Firebase Auth with role claim' },
      { id: 'p08', wbs: '0.8', label: 'Project README',            dur: 0.5,  ef: 5.5,  desc: 'Write README: overview, setup instructions, env var docs, deployment steps' },
    ]
  },
  {
    id: 1, name: 'Phase 1 · Authentication', colour: '#3FB950',
    tasks: [
      { id: 'p11', wbs: '1.1', label: 'Firebase Auth Init',        dur: 0.5,  ef: 6.0,  desc: 'Implement auth-service.js initialisation and onAuthStateChanged listener' },
      { id: 'p12', wbs: '1.2', label: 'Student Self-Registration', dur: 1.0,  ef: 7.0,  desc: 'Registration form, client validation, Firebase createUser, role claim write' },
      { id: 'p13', wbs: '1.3', label: 'Login Form',                dur: 0.5,  ef: 7.5,  desc: 'Login form, validation, Firebase signIn, role-based redirect on success' },
      { id: 'p14', wbs: '1.4', label: 'Logout',                    dur: 0.5,  ef: 8.0,  desc: 'Logout button in nav-bar, Firebase signOut, clear application state, redirect' },
      { id: 'p15', wbs: '1.5', label: 'Role Claim Retrieval',      dur: 0.5,  ef: 8.5,  desc: 'getAuthState and getCurrentUserRole functions reading custom claims from ID token' },
      { id: 'p16', wbs: '1.6', label: 'Portfolio Init on Register',dur: 0.5,  ef: 9.0,  desc: 'Create portfolios/{userId} Firestore doc with $10,000 CAD starting capital' },
      { id: 'p17', wbs: '1.7', label: 'Firestore Rules — Auth',    dur: 0.5,  ef: 9.5,  desc: 'Write and test Security Rules for users collection: read own, no write except role' },
      { id: 'p18', wbs: '1.8', label: 'Unit Tests — Auth Service', dur: 0.5,  ef: 10.0, desc: 'Jest tests for auth-service.js using Firebase emulator' },
    ]
  },
  {
    id: 2, name: 'Phase 2 · Routing', colour: '#D29922',
    tasks: [
      { id: 'p21', wbs: '2.1', label: 'Hash-Based Router',         dur: 1.0,  ef: 11.0, desc: 'Implement router.js: route registration, hash change listener, view mount/unmount' },
      { id: 'p22', wbs: '2.2', label: 'Route Guards by Role',      dur: 0.5,  ef: 11.5, desc: 'guardRoute function: check auth state and role claim before allowing navigation' },
      { id: 'p23', wbs: '2.3', label: 'Wire All Routes to Views',  dur: 0.5,  ef: 12.0, desc: 'Register all 8 routes in router.js and connect to respective view modules' },
      { id: 'p24', wbs: '2.4', label: 'Nav-Bar Component',         dur: 0.5,  ef: 12.5, desc: 'nav-bar.js: renders navigation items appropriate to current user role' },
      { id: 'p25', wbs: '2.5', label: 'Unit Tests — Router',       dur: 0.5,  ef: 13.0, desc: 'Jest tests for router.js: route matching, guard logic, redirect behaviour' },
    ]
  },
  {
    id: 3, name: 'Phase 3 · Market Data', colour: '#F78166',

// ── STORAGE ──────────────────────────────────────────────────
// Persist completion state in localStorage
const STORAGE_KEY = 'investsim-tracker-v1';

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch (e) {
    return {};
  }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ── STATE ────────────────────────────────────────────────────
let state = loadState();
// state structure: { [taskId]: { completedDate: 'YYYY-MM-DD' } | null }

// ── COMPUTE STATUS ───────────────────────────────────────────
/**
 * Determine the display status of a task.
 * @param {object} task
 * @returns {'pending'|'ontime'|'late1'|'overdue'}
 */
function getStatus(task) {
  const entry = state[task.id];
  if (!entry) return 'pending';

  const scheduled = scheduledDate(task.ef);
  const completed = new Date(entry.completedDate + 'T00:00:00');

  // Difference in calendar days
  const diffMs   = completed - scheduled;
  const diffDays = Math.round(diffMs / (1000 * 60 * 60 * 24));

  if (diffDays <= 0) return 'ontime';
  if (diffDays === 1) return 'late1';
  return 'overdue';
}

// ── HEADER DATES ────────────────────────────────────────────
const lastTask = PHASES[PHASES.length - 1].tasks.at(-1);
const projectEndDate = scheduledDate(lastTask.ef);

document.getElementById('hdr-end').textContent = fmtDate(projectEndDate);
document.getElementById('hdr-today').textContent = fmtDate(new Date());

// ── RENDER ───────────────────────────────────────────────────
function render() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  let totalTasks = 0, doneOnTime = 0, doneLate1 = 0, doneOverdue = 0;

  PHASES.forEach(phase => {
    totalTasks += phase.tasks.length;
    phase.tasks.forEach(t => {
      const s = getStatus(t);
      if (s === 'ontime')  doneOnTime++;
      if (s === 'late1')   doneLate1++;
      if (s === 'overdue') doneOverdue++;
    });

    const doneInPhase = phase.tasks.filter(t => getStatus(t) !== 'pending').length;
    const block = document.createElement('div');
    block.className = 'phase-block';
    block.dataset.phase = phase.id;

    // Phase first/last dates
    const phaseStart = scheduledDate(phase.tasks[0].ef - phase.tasks[0].dur);
    const phaseEnd   = scheduledDate(phase.tasks.at(-1).ef);

    block.innerHTML = `
      <div class="phase-header" onclick="togglePhase(${phase.id})">
        <div class="phase-header-left">
          <div class="phase-dot" style="background:${phase.colour}"></div>
          <span class="phase-name" style="color:${phase.colour}">${phase.name}</span>
          <span class="phase-dates">${fmtDate(phaseStart)} → ${fmtDate(phaseEnd)}</span>
        </div>
        <div class="phase-header-right">
          <span class="phase-progress-text">${doneInPhase} / ${phase.tasks.length}</span>
          <span class="phase-chevron">▼</span>
        </div>
      </div>
      <div class="phase-body" id="phase-body-${phase.id}"></div>
    `;

    main.appendChild(block);

    const body = document.getElementById(`phase-body-${phase.id}`);

    // Today banner — show before the first not-yet-due task
    let todayBannerShown = false;
    const today = new Date();
    today.setHours(0,0,0,0);

    phase.tasks.forEach(task => {
      const dueDate = scheduledDate(task.ef);
      const status  = getStatus(task);

      // Insert today banner before first task due today or in the future
      if (!todayBannerShown && dueDate >= today) {
        const banner = document.createElement('div');
        banner.className = 'today-banner';
        banner.textContent = `Today — ${fmtDate(today)}`;
        body.appendChild(banner);
        todayBannerShown = true;
      }

      const row = document.createElement('div');
      row.className = `task-row status-${status}`;
      row.id = `row-${task.id}`;

      const statusLabels = { pending: '— pending', ontime: '✓ on time', late1: '⚠ 1 day late', overdue: '✕ overdue' };
      const completedStr = state[task.id]
        ? `Completed ${fmtDate(new Date(state[task.id].completedDate + 'T00:00:00'))}`
        : `Due ${fmtDate(dueDate)}`;

      row.innerHTML = `
        <div class="task-check" onclick="openModal('${task.id}')" title="Click to mark complete / update">
          <svg viewBox="0 0 12 10" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1,5 4.5,8.5 11,1"/>
          </svg>
        </div>
        <span class="task-id">${task.wbs}</span>
        <div class="task-content">
          <div class="task-label">${task.label}</div>
          <div class="task-desc">${task.desc}</div>
        </div>
        <div class="task-date">
          <span class="date-label">${state[task.id] ? 'completed' : 'due'}</span>
          ${completedStr}
        </div>
        <div class="task-dur">${task.dur}d</div>
        <div class="task-status ${status}" onclick="openModal('${task.id}')">${statusLabels[status]}</div>
      `;

      body.appendChild(row);
    });
  });

  // Progress stats
  const pending = totalTasks - doneOnTime - doneLate1 - doneOverdue;
  const statsEl = document.getElementById('progress-stats');
  statsEl.innerHTML = `
    <div class="stat-chip total"><div class="stat-dot" style="background:#8B949E"></div>${totalTasks} tasks total</div>
    <div class="stat-chip done-on"><div class="stat-dot" style="background:var(--green)"></div>${doneOnTime} on time</div>
    <div class="stat-chip done-late"><div class="stat-dot" style="background:var(--yellow)"></div>${doneLate1} 1 day late</div>
    <div class="stat-chip overdue"><div class="stat-dot" style="background:var(--red)"></div>${doneOverdue} overdue</div>
    <div class="stat-chip pending"><div class="stat-dot" style="background:var(--border)"></div>${pending} pending</div>
  `;

  // Progress bar
  const trackEl = document.getElementById('progress-track');
  const pct = n => `${(n / totalTasks * 100).toFixed(1)}%`;
  trackEl.innerHTML = `
    <div class="progress-fill green"  style="width:${pct(doneOnTime)}"></div>
    <div class="progress-fill yellow" style="width:${pct(doneLate1)}"></div>
    <div class="progress-fill red"    style="width:${pct(doneOverdue)}"></div>
  `;
}

// ── PHASE TOGGLE ─────────────────────────────────────────────
function togglePhase(phaseId) {
  const block = document.querySelector(`[data-phase="${phaseId}"]`);
  block.classList.toggle('collapsed');
}

// ── MODAL ────────────────────────────────────────────────────
let activeTaskId = null;

function openModal(taskId) {
  // Find task data
  let task = null;
  PHASES.forEach(p => p.tasks.forEach(t => { if (t.id === taskId) task = t; }));
  if (!task) return;

  activeTaskId = taskId;

  const dueDate = scheduledDate(task.ef);
  const existing = state[taskId];

  document.getElementById('modal-title').textContent = task.label;
  document.getElementById('modal-sub').textContent   = `WBS ${task.wbs} — ${task.desc}`;
  document.getElementById('modal-scheduled-info').textContent =
    `Scheduled due date: ${fmtDate(dueDate)}`;

  const input = document.getElementById('modal-date-input');
  input.value = existing ? existing.completedDate : fmtISO(new Date());
  input.max   = fmtISO(new Date());

  document.getElementById('modal-overlay').classList.add('open');
}

document.getElementById('modal-cancel-btn').onclick = () => {
  document.getElementById('modal-overlay').classList.remove('open');
  activeTaskId = null;
};

document.getElementById('modal-overlay').onclick = (e) => {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
    activeTaskId = null;
  }
};

document.getElementById('modal-confirm-btn').onclick = () => {
  if (!activeTaskId) return;
  const dateVal = document.getElementById('modal-date-input').value;
  if (!dateVal) return;

  state[activeTaskId] = { completedDate: dateVal };
  saveState(state);
  document.getElementById('modal-overlay').classList.remove('open');
  activeTaskId = null;
  render();
};

document.getElementById('modal-clear-btn').onclick = () => {
  if (!activeTaskId) return;
  delete state[activeTaskId];
  saveState(state);
  document.getElementById('modal-overlay').classList.remove('open');
  activeTaskId = null;
  render();
};

// ── INIT ─────────────────────────────────────────────────────
render();
</script>
